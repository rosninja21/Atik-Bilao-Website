<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="home-style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="menu-text">
        <h1 class="menu-h1">YOUR CART</h1>
        <p>You have <p id="cart-number-placeholder"></p> item in your cart</p>

        <div class="cart-container">
    <div class="cart-header">
        <a href="menu.html" class="back-link">← Continue Shopping</a>
        <button class="clear-btn">Clear All</button>
    </div>

    <div class="cart-layout">
        <main class="cart-items">
            <div class="cart-card">
                <img src="images/pancit-bam-e.png" alt="Pancit Bam-I" class="item-img">
                <div class="item-details">
                    <h3>Pancit Bam-I</h3>
                    <p class="size">Small</p>
                    <p class="price">₱ 300</p>
                </div>
                <div class="quantity-controls">
                    <button class="qty-btn">-</button>
                    <span>1</span>
                    <button class="qty-btn">+</button>
                </div>
                <div class="item-total">
                    <span>₱ 300</span>
                    <button class="delete-btn">🗑️</button>
                </div>
            </div>
        </main>

        <aside class="order-summary">
            <h2>Order Summary</h2>
            <div class="summary-row">
                <span>Pancit Bam-I (Small) x1</span>
                <span>₱ 300</span>
            </div>
            <hr>
            <div class="summary-row">
                <span>Subtotal (1 items)</span>
                <span>₱ 300</span>
            </div>
            <div class="summary-row">
                <span>Delivery Fee</span>
                <span class="tbd">TBD</span>
            </div>
            <div class="total-row">
                <h3>Total</h3>
                <h3 class="total-price">₱ 300</h3>
            </div>
            <button class="checkout-btn">Proceed to Checkout</button>
            <p class="disclaimer">* Delivery fee depends on your location and order volume</p>
        </aside>
    </div>
</div>
        
        
    <div id="footer-placeholder"></div>
</body>
<script src="script.js"></script>
</html>
