<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="../css/home-style.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/checkout.css">
    <link rel="stylesheet" href="../css/contact-style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

     <div class="menu-text">
    <h1 class="menu-h1">CHECKOUT</h1>
    <p class="menu-p">Complete your order details</p>
   </div>



   <div class="checkout-details-container">
    <a href="menu.html"><i class="fa-solid fa-arrow-left"></i>Back to Menu</a>
   </div>

    <div class="contact-checkout contact-border">
        <form id="checkout-form">
       <div class="contact-icon"><div class="icon-box"><i class="fa-solid fa-phone"></i></div><h2>Contact Information</h2></div> 
        <label for="">Full Name </label>
        <input type="text" name="fullname" id="fullname" placeholder="Juan Dela Cruz" required minlength="3">
        <p class="error-msg" id="name-error"> </p>
        <label for="">Phone Number</label>
        <input type="text" id="phone-number" name="phone-number" placeholder="09XX-XXX-XXXX" maxlength="11" required>
        <p class="error-msg" id="phone-error"> </p>
        
    </div>

    <div class="delivery-checkout contact-border">
        <div class="contact-icon"><div class="icon-box"><i class="fa-solid fa-location-dot"></i></div><h2>Delivery Details</h2></div>
        <label for="">Delivery/Pickup Address</label>
        <input type="text" id="address" name="address" placeholder="Type your address here..." required> 
        <p class="error-msg" id="address-error"> </p>
        <div class="red-green-btn-wrapper"> <button class="red-button"><i class="fa-solid fa-location-dot"></i>Select Location on Map</button>
        
        <button class="green-button"><i class="fa-solid fa-magnifying-glass-location"></i>View Atik Bilao Location</button></div>
       
        <p class="small-font-first"><i class="fa-solid fa-lightbulb"></i>Leave blank for pickup at our location (no delivery fee)</p>
        <br>

        <label for="">Preferred Delivery/Pickup Date</label>
        <input type="date" name="date" id="date">
        <p class="error-msg" id="date-error"> </p>

    </div>

    <div class="payment-checkout contact-border">
        <div class="contact-icon"><div class="icon-box"><i class="fa-solid fa-credit-card"></i></div><h2>Payment Method</h2></div>

    <div class="payment-option">
        <input type="radio" name="payment" id="gcash" checked>
        <label for="gcash" class="inline-label">Gcash</label>
    </div>

    <div class="payment-option">
        <input type="radio" name="payment" id="cash">
        <label for="cash" class="inline-label">Cash on Pickup/Delivery</label>
    </div>
    <p class="error-msg" id="payment-error"> </p>
    </div>


    <div class="notes-checkout contact-border">
        <label for="">Additional Notes (Optional)</label>
        <textarea name="" id="" rows="4" placeholder="E.g. Allergies, special requests, event details..."></textarea>
    </div>


    <div class="order-summary  contact-border">
        <h2>Order Summary</h2>
        <div class="checkout-placeholder"></div>
    </div>

 <div class="messenger-btn-wrapper">
    <button type="submit" class="messenger-btn-checkout" onclick="checkoutButton(event)">
        <i class="fa-brands fa-facebook-messenger"></i> Checkout via Messenger
    </button>
</div>
</form>
    <div id="footer-placeholder"></div>
    
    
</body>
<script src="../js/script.js"></script>
</html>
