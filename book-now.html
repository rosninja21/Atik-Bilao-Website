<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now</title>
    <link rel="stylesheet" href="../css/home-style.css">
    <link rel="stylesheet" href="../css/book-now.css">
    <link rel="stylesheet" href="../css/icon-style.css">
    <link rel="stylesheet" href="../css/menu.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navbar-placeholder"></div> 

    <div class="booking-container">
    <div class="booking-header">
        <h1 class="menu-h1">SELECT YOUR ORDERS</h1>
        <p>Tap the <span>+</span> circle on each item you want and select the size and quantity, then hit <b>Proceed</b> below.</p>
        
        <div class="menu-searchbar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search for your favorite food..." class="search-input">
        </div>

        <div class="div-menu-buttons">
            <button class="menu-btn active" data-filter="all">All</button>
            <button class="menu-btn" data-filter="main">Main Dishes & Platters</button>
            <button class="menu-btn" data-filter="combos">Combos</button>
            <button class="menu-btn" data-filter="desserts">Desserts & Delicacies</button>
        </div>
    </div>

    <div id="food-container" class="menu-dishes-grid"></div>
  
<div class="footer-actions">
    <button id="proceed-btn" style="display: none;" onclick="window.location.href='checkout.html'">
        Proceed to Checkout <i class="fa-solid fa-arrow-right"></i>
    </button>
</div>
    
  

    <div id="food-container"></div> <div id="footer-placeholder"></div>
</body>
<script src="../js/script.js"></script>
</html>
