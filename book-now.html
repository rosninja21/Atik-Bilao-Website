<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="home-style.css">
    <link rel="stylesheet" href="book-now.css">
</head>
<body>
    <div id="navbar-placeholder"></div> 

    <div class="booking-container">
    <div class="booking-header">
        <h1 class="menu-h1">SELECT YOUR ORDERS</h1>
        <p>Tap the <span>+</span> circle on each item you want and select the size, then hit <b>Proceed</b> below.</p>
        
        <div class="menu-searchbar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search for your favorite food..." class="search-input">
        </div>

        <div class="div-menu-buttons">
            <button class="menu-btn active">All</button>
            <button class="menu-btn">Main Dishes & Platters</button>
            <button class="menu-btn">Combos</button>
            <button class="menu-btn">Desserts & Delicacies</button>
        </div>
    </div>

    <div id="food-container" class="order-grid"></div>
    
    <div class="footer-actions">
        <button class="proceed-btn">Proceed</button>
    </div>
</div>

    <div id="food-container"></div> <div id="footer-placeholder"></div>
</body>
<script src="script.js"></script>
</html>
